name: Deploy

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Run server update script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            if [ "${{ github.ref_name }}" = "dev" ]; then
              APP_DIR="/www/wwwroot/acg-faka-dev"
              REPO="git@github.com:${{ github.repository }}.git"
              if [ ! -d "$APP_DIR/.git" ]; then
                rm -rf "$APP_DIR"
                git clone -b dev "$REPO" "$APP_DIR"
              fi
            else
              APP_DIR="${{ secrets.APP_DIR }}"
            fi
            cd "$APP_DIR"
            APP_DIR="$APP_DIR" BRANCH="${{ github.ref_name }}" USE_DOCKER=1 bash scripts/server-update.sh
